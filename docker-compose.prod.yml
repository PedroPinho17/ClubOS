# ClubOS — producao (Coolify / VPS)
# Uso: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# Antes do primeiro arranque:
#   1. Copiar .env.example para .env e preencher segredos de producao
#   2. docker compose up -d postgres redis minio
#   3. pnpm db:deploy (primeiro arranque; NÃO correr db:seed em produção)

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: clubos-api
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      API_PORT: 4000
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
    container_name: clubos-web
    restart: unless-stopped
    environment:
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      - api
