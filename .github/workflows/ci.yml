name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: clubos
          POSTGRES_PASSWORD: clubos
          POSTGRES_DB: clubos
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://clubos:clubos@localhost:5432/clubos?schema=public
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      BETTER_AUTH_SECRET: ci-test-secret-with-at-least-32-characters
      BETTER_AUTH_URL: http://localhost:4000
      WEB_ORIGIN: http://localhost:3000
      NEXT_PUBLIC_API_URL: http://localhost:4000
      NEXT_STANDALONE: 'true'
      SEED_DEMO_PASSWORD: CiSeedPass1!
      NODE_ENV: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Build Database package
        run: pnpm --filter @clubos/database build

      - name: Deploy database migrations
        run: pnpm db:deploy

      - name: Seed database
        run: pnpm db:seed

      - name: Typecheck API
        run: pnpm --filter @clubos/api typecheck

      - name: Typecheck Web
        run: pnpm --filter @clubos/web typecheck

      - name: Lint API
        run: pnpm --filter @clubos/api lint

      - name: Lint Web
        run: pnpm --filter @clubos/web lint

      - name: Build Web
        run: pnpm --filter @clubos/web build

      - name: Build API
        run: pnpm --filter @clubos/api build

      - name: Test API (unit + E2E)
        run: pnpm --filter @clubos/api test

      - name: Install Playwright browsers
        run: pnpm --filter @clubos/web exec playwright install --with-deps chromium

      - name: E2E Web (Playwright)
        run: pnpm --filter @clubos/web test:e2e
        env:
          E2E_USER_EMAIL: admin@crcvale.pt
          E2E_USER_PASSWORD: ${{ env.SEED_DEMO_PASSWORD }}
          CI: true
