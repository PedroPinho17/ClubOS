name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: clubos
          POSTGRES_PASSWORD: clubos
          POSTGRES_DB: clubos
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://clubos:clubos@localhost:5432/clubos?schema=public
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      BETTER_AUTH_SECRET: ci-test-secret-with-at-least-32-characters
      BETTER_AUTH_URL: http://localhost:4000
      WEB_ORIGIN: http://localhost:3000
      SEED_DEMO_PASSWORD: CiSeedPass1!
      NODE_ENV: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Push database schema
        run: pnpm db:push

      - name: Seed database
        run: pnpm db:seed

      - name: Typecheck API
        run: pnpm --filter @clubos/api typecheck

      - name: Typecheck Web
        run: pnpm --filter @clubos/web typecheck

      - name: Test API (unit + E2E)
        run: pnpm --filter @clubos/api test
